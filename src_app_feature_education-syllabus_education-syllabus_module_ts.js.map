<form [formGroup]="_fs._form" (ngSubmit)="_onSubmit()">
  <div class="row m-0">
    <di-txt field='code' lbl="Subject Code"></di-txt>
    <di-txt field='name' lbl="Subject Name"></di-txt>
    <di-txt field='description' lbl="Description"></di-txt>
    <di-txt field='status' lbl="Status"></di-txt>
    <di-txt field='desc' [req]="false" lbl="Additional Description"></di-txt>
  </div>
</form>

<form [formGroup]="_fs._form" (ngSubmit)="_onSubmit()">
  <div class="row m-0">
    <di-txt field='code' lbl="Book Code"></di-txt>
    <di-txt field='title' lbl="Book Title"></di-txt>
    <di-txt field='author' lbl="Author"></di-txt>
    <di-txt field='isbn' lbl="ISBN"></di-txt>
    <di-txt field='publisher' lbl="Publisher"></di-txt>
    <di-txt field='status' lbl="Status"></di-txt>
    <di-txt field='desc' [req]="false" lbl="Description"></di-txt>
  </div>
</form>

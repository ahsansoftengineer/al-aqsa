<div class="mat_table" *ngIf="lb.ds">
  <table mat-table matSort [dataSource]="lb.ds" style="box-shadow: none;" (matSortChange)="lb.sort($event)">
    <ng-container matColumnDef="id">
      <th style="width: 40px" mat-header-cell *matHeaderCellDef>{{ 'S No' | translate }}</th>
      <td mat-cell *matCellDef="let item; let i = index"> {{i + (lb.tbl.index * lb.tbl.size) + 1}} </td>
    </ng-container>

    <ng-container matColumnDef="code">
      <th mat-header-cell *matHeaderCellDef mat-sort-header arrowPosition='after'>
        <di-tbl-txt field='code' lbl='Code' [group]='lb.fh'></di-tbl-txt>
      </th>
      <td mat-cell *matCellDef="let item"> {{item?.code}} </td>
    </ng-container>

    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef mat-sort-header arrowPosition='after'>
        <di-tbl-txt field='title' lbl='Title' [group]='lb.fh'></di-tbl-txt>
      </th>
      <td mat-cell *matCellDef="let item"> {{item?.title}} </td>
    </ng-container>

    <ng-container matColumnDef="author">
      <th mat-header-cell *matHeaderCellDef mat-sort-header arrowPosition='after'>
        <di-tbl-txt field='author' lbl='Author' [group]='lb.fh'></di-tbl-txt>
      </th>
      <td mat-cell *matCellDef="let item"> {{item?.author}} </td>
    </ng-container>

    <ng-container matColumnDef="isbn">
      <th mat-header-cell *matHeaderCellDef mat-sort-header arrowPosition='after'>
        <di-tbl-txt field='isbn' lbl='ISBN' [group]='lb.fh'></di-tbl-txt>
      </th>
      <td mat-cell *matCellDef="let item"> {{item?.isbn}} </td>
    </ng-container>

    <ng-container matColumnDef="publisher">
      <th mat-header-cell *matHeaderCellDef mat-sort-header arrowPosition='after'>
        <di-tbl-txt field='publisher' lbl='Publisher' [group]='lb.fh'></di-tbl-txt>
      </th>
      <td mat-cell *matCellDef="let item"> {{item?.publisher}} </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header arrowPosition='after'>
        <di-tbl-txt field='status' lbl='Status' [group]='lb.fh'></di-tbl-txt>
      </th>
      <td mat-cell *matCellDef="let item"> {{item?.status}} </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef mat-sort-header arrowPosition='after'>
        <span style="font-size:16px; font-weight: 400;">Actions</span>
      </th>
      <td mat-cell *matCellDef="let item">
        <aam-tbl-actions [record]="item"></aam-tbl-actions>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="lb.cols; sticky:true"></tr>
    <tr mat-row *matRowDef="let row; columns: lb.cols;"></tr>
  </table>
</div>

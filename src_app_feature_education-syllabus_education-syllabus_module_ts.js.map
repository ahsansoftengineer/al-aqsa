<form [formGroup]="_fs._form" (ngSubmit)="_onSubmit()">
  <div class="row m-0">
    <di-txt field='code' lbl="Question Code"></di-txt>
    <di-txt field='question' lbl="Question"></di-txt>
    <di-txt field='chapter' lbl="Chapter"></di-txt>
    <di-txt field='difficulty' lbl="Difficulty"></di-txt>
    <di-txt field='marks' lbl="Marks"></di-txt>
    <di-txt field='answer' lbl="Answer"></di-txt>
    <di-txt field='status' lbl="Status"></di-txt>
    <di-txt field='desc' [req]="false" lbl="Description"></di-txt>
  </div>
</form>

<form [formGroup]="_fs._form" (ngSubmit)="_onSubmit()">
  <div class="row m-0">
    <di-txt field='code' lbl="Chapter Code"></di-txt>
    <di-txt field='title' lbl="Chapter Title"></di-txt>
    <di-txt field='bookTitle' lbl="Book Title"></di-txt>
    <di-txt field='pageNumber' lbl="Page Number"></di-txt>
    <di-txt field='content' lbl="Content"></di-txt>
    <di-txt field='status' lbl="Status"></di-txt>
    <di-txt field='desc' [req]="false" lbl="Description"></di-txt>
  </div>
</form>

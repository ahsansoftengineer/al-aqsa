<mat-card class="dashboard-card p-lg-2 p-1 m-1 mb-0">
  <mat-card-content class="dashboard-card-content">
    <mat-grid-list cols="12" rowHeight="50px">
      <mat-grid-tile [colspan]="SM || _template.linkList ? 12 : 6" class="flex--start">
        <section>
          <h1 class="m-0 mt-2" *ngIf="_template?.title">{{_template?.title | translate}}</h1>
          <p>
            <a *ngFor="let l of _template?.layer || []; let i = index" [href]="l">{{i == 0 ? '':' / '}} {{l}}</a>
          </p>
        </section>
      </mat-grid-tile>
      <mat-grid-tile class="m-1" [colspan]="SM ? 12 : 6" class="flex--end" *ngIf="_template?.linkCreate">
        <a  mat-raised-button color="primary" class="me-1" [routerLink]="_template.linkCreate">
          <mat-icon [ngClass]="{'me-2' : LG}">local_hospital</mat-icon> <span *ngIf="LG">{{'Add' | translate}}</span>
        </a>
        <button mat-raised-button type="button" color="primary" class="me-1" (click)="_template.ActionListReset()">
          <mat-icon [ngClass]="{'me-2' : LG}">filter_alt_off</mat-icon> <span *ngIf="LG">{{'Reset Filter' | translate}}</span>
        </button>
        <button mat-raised-button type="button" color="primary" class="me-1" (click)="_template.ActionListRefresh()">
          <mat-icon [ngClass]="{'me-2' : LG}">autorenew</mat-icon> <span *ngIf="LG">{{'Refresh' | translate}}</span>
        </button>
        <button mat-raised-button type="button" color="primary" (click)="_template.ActionListPrint()">
          <mat-icon [ngClass]="{'me-2' : LG}">print</mat-icon> <span *ngIf="LG">{{'Print' | translate}}</span>
        </button>
      </mat-grid-tile>
    </mat-grid-list>
    <mat-grid-list cols="1" [rowHeight]="LG ? '76.5vh' : '72.5vh'">
      <mat-grid-tile colspan="1">
        <div class="m-1" style="width: 100%; height: 100%; overflow-x: auto;">
          <router-outlet></router-outlet>
        </div>
      </mat-grid-tile>
    </mat-grid-list>
    <mat-grid-list cols="1" rowHeight="50px">
      <mat-grid-tile colspan="1" class="flex--end">
        <mat-card-actions align="end" *ngIf="_template?.linkList" class="m-2">
          <button mat-raised-button type="button" color="primary" (click)="_template.ActionFormReset()">
            <mat-icon [ngClass]="{'me-2' : LG}">cached</mat-icon> <span *ngIf="LG">{{'Reset' | translate}}</span>
          </button>
          <button mat-raised-button type="button" color="primary" class="mx-1" (click)="_template.ActionFormSave()">
            <mat-icon [ngClass]="{'me-2' : LG}">save</mat-icon> <span *ngIf="LG">{{'Save' | translate}}</span>
          </button>
          <a mat-raised-button color="primary" [routerLink]="_template?.linkList">
            <mat-icon [ngClass]="{'me-2' : LG}">cancel</mat-icon> <span *ngIf="LG">{{'Cancel' | translate}}</span>
          </a>
        </mat-card-actions>
        <mat-card-actions align="end" *ngIf="_template.linkCreate" class="mt-3">
          <!-- [tbl]="lb.tbl" (paginateEvent)="lb.refresh()" -->
          <di-paginator></di-paginator>
        </mat-card-actions>
      </mat-grid-tile>
    </mat-grid-list>
  </mat-card-content>
</mat-card>

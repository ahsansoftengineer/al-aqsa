<mat-card class="dashboard-card p-lg-2 p-1 m-1 mb-0">
  <mat-card-content class="dashboard-card-content">
    <mat-grid-list cols="12" rowHeight="50px">
      <mat-grid-tile [colspan]="SM || _template.linkList ? 12 : 5" class="flex--start">
        <section>
          <h1 class="m-0 mt-2" *ngIf="_template?.title">{{_template?.title | translate}}</h1>
          <p>
            <a *ngFor="let l of _template?.layer || []; let i = index" [href]="l">{{i == 0 ? '':' / '}} {{l}}</a>
          </p>
        </section>
      </mat-grid-tile>
      <mat-grid-tile class="m-1" [colspan]="SM ? 12 : 7" class="flex--end" *ngIf="_template?.linkCreate">
        <ng-container *ngIf="LG">
          <a  mat-raised-button color="primary" class="me-2" [routerLink]="_template.linkCreate">
            <mat-icon class="me-2">local_hospital</mat-icon> <span>{{'Add' | translate}}</span>
          </a>
          <!-- <button mat-raised-button color="primary" class="me-2" type="button"   (click)="_template.ActionListSearch()">
            <mat-icon class="me-2">search</mat-icon> <span>{{'Search' | translate}}</span>
          </button> -->
          <button mat-raised-button color="primary" class="me-2" type="button"   (click)="_template.ActionListRefresh()">
            <mat-icon class="me-2">autorenew</mat-icon> <span>{{'Refresh' | translate}}</span>
          </button>
          <button mat-raised-button color="primary" class="me-2" type="button"   (click)="_template.ActionListReset()">
            <mat-icon class="me-2">filter_alt_off</mat-icon> <span>{{'Reset Filter' | translate}}</span>
          </button>
          <button mat-raised-button color="primary" class="me-2" type="button"  (click)="_template.ActionListPrint()">
            <mat-icon class="me-2">print</mat-icon> <span >{{'Print' | translate}}</span>
          </button>
          <button mat-raised-button color="primary" class="me-2" type="button"  (click)="_template.ActionListExport()">
            <mat-icon class="me-2">download</mat-icon> <span >{{'Download' | translate}}</span>
          </button>
        </ng-container>
        <ng-container  *ngIf="!LG">
          <a  mat-mini-fab color="primary" class="me-2" [routerLink]="_template.linkCreate">
            <mat-icon>local_hospital</mat-icon>
          </a>
          <!-- <button mat-mini-fab color="primary" class="me-2" type="button"  (click)="_template.ActionListSearch()">
            <mat-icon>search</mat-icon>
          </button> -->
          <button mat-mini-fab color="primary" class="me-2" type="button"  (click)="_template.ActionListRefresh()">
            <mat-icon>autorenew</mat-icon>
          </button>
          <button mat-mini-fab color="primary" class="me-2" type="button"  (click)="_template.ActionListReset()">
            <mat-icon>filter_alt_off</mat-icon>
          </button>
          <button mat-mini-fab color="primary" class="me-2" type="button"  (click)="_template.ActionListExport()">
            <mat-icon>download</mat-icon>
          </button>
          <button mat-mini-fab color="primary" class="me-2" type="button"  (click)="_template.ActionListPrint()">
            <mat-icon>print</mat-icon>
          </button>


        </ng-container>

      </mat-grid-tile>
    </mat-grid-list>
    <mat-grid-list cols="1" [rowHeight]="LG ? '76.5vh' : '72.5vh'">
      <mat-grid-tile colspan="1">
        <div class="m-1" style="width: 100%; height: 100%; overflow-x: auto;">
          <router-outlet></router-outlet>
        </div>
      </mat-grid-tile>
    </mat-grid-list>
    <mat-grid-list cols="1" rowHeight="50px">
      <mat-grid-tile colspan="1" class="flex--end">
        <mat-card-actions align="end" *ngIf="_template?.linkList" class="m-2">
          <ng-container *ngIf="LG">
            <button mat-raised-button type="button" color="primary" class="me-2" (click)="_template.ActionFormReset()">
              <mat-icon class="me-2">cached</mat-icon> <span>{{'Reset' | translate}}</span>
            </button>
            <button mat-raised-button type="button" color="primary" class="me-2" (click)="_template.ActionFormSave()">
              <mat-icon class="me-2">save</mat-icon> <span>{{'Save' | translate}}</span>
            </button>
            <a mat-raised-button color="primary" class="me-2" [routerLink]="_template?.linkList">
              <mat-icon class="me-2">cancel</mat-icon> <span>{{'Cancel' | translate}}</span>
            </a>
          </ng-container>
          <ng-container *ngIf="!LG">
            <button mat-mini-fab color="primary" class="me-2" type="button" (click)="_template.ActionFormReset()">
              <mat-icon>cached</mat-icon>
            </button>
            <button mat-mini-fab color="primary" class="me-2" type="button" (click)="_template.ActionFormSave()">
              <mat-icon>save</mat-icon>
            </button>
            <a mat-mini-fab color="primary" class="me-2" [routerLink]="_template?.linkList">
              <mat-icon>cancel</mat-icon>
            </a>
          </ng-container>
        </mat-card-actions>

        <mat-card-actions align="end" *ngIf="_template.linkCreate" class="mt-3">
          <!-- [tbl]="lb.tbl" (paginateEvent)="lb.refresh()" -->
          <di-paginator></di-paginator>
        </mat-card-actions>
      </mat-grid-tile>
    </mat-grid-list>
  </mat-card-content>
</mat-card>

<mat-form-field appearance="fill" class="col-12 my-1">
  <mat-label>{{ lbl | translate }}</mat-label>
  <input
    matInput
    autocomplete="off"
    (blur)="FuncBlur($event)"
    [formControl]="control"
    [required]="req"
    [readonly]="readonly"
    [type]="type"
  />
  <mat-error *ngIf="control?.touched">{{ errMsg }}</mat-error>
</mat-form-field>

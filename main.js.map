<button mat-icon-button [matMenuTriggerFor]="menu" type="button">
  <mat-icon>more_vert</mat-icon>
</button>
<mat-menu #menu="matMenu" type="button">
  <!-- _template.ActionListEdit(record?.id) -->
  <a mat-menu-item  color="primary" class="me-1 text-primary" [routerLink]="[_template.linkCreate]" [queryParams]="{id: record?.id}">
    <mat-icon class="text-primary">edit</mat-icon>
    <span>{{'Edit' | translate}}</span>
  </a>
  <button mat-menu-item type="button" class="text-warning" (click)="_template.ActionListStatus(record?.id)">
    <mat-icon ngClass="{{record.status === 'active' ? 'text-success' : 'text-warning'}}">
      {{record.status === 'active' ? 'toggle_on' : 'toggle_off'}}
    </mat-icon>
    <span ngClass="{{record.status === 'active' ? 'text-success' : 'text-warning'}}">Toggle Status</span>
  </button>
  <button mat-menu-item type="button" class="text-danger" (click)="_template.ActionListDelete(record?.id)">
    <mat-icon class="text-danger">delete</mat-icon>
    <span>Delete</span>
  </button>
</mat-menu>

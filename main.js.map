<a [routerLink]="item.link">
  <mat-list-item (click)="navParentHandler(item?.link)" class="mb-1 p-0"
    [ngClass]="{'parent-active': this._ss.sideBarParentActive == item?.id}">
    <mat-icon mat-list-icon class="me-0">{{item?.icon}}</mat-icon>
    <span mat-line class="pe-0 ">{{item?.title}}</span>
    <span *ngIf="this._ss.sideBarParentActive == item?.id && item?.submenu?.length">
      <mat-icon mat-list-icon class="me-0">keyboard_arrow_down</mat-icon>
    </span>
    <span *ngIf="this._ss.sideBarParentActive != item?.id && item?.submenu?.length">
      <mat-icon mat-list-icon class="me-0">keyboard_arrow_right</mat-icon>
    </span>
    <!-- RECURSIVE EXAMPLE HERE -->
    <!-- <ng-container *ngFor="let it of item.submenu" >
        <aam-side-bar-mat-list-item [item]="it"></aam-side-bar-mat-list-item>
      </ng-container> -->

  </mat-list-item>

</a>

<div [@slideOutLeftOnLeave] [@slideInLeftOnEnter] *ngIf="_ss.sideBarParentActive == item?.id" class="mb-1"
  style="background-color: rgba(0, 0, 0, 5%);">
  <ng-container *ngFor="let it of this.item?.submenu">
    <!-- *ngIf="it.isShow"
       -->
    <a [routerLink]="it.link">
      <mat-list-item class="mb-1 p-0 ps-3" style="height: 40px"
        [ngClass]="{'child-active': _ss.sideBarChildActive == it?.link}" (click)="navChildHandler(it.link)">
        <mat-icon mat-list-icon class="me-0">{{ it?.icon || 'blur_circular'}}</mat-icon>
        <span mat-line class="pe-0">{{it.title}}</span>
      </mat-list-item>
    </a>
  </ng-container>
</div>

<mat-form-field
  appearance="fill"
  class="col-md-12 my-1"
>
  <mat-label>{{ lbl | translate }}</mat-label>
  <input
    matInput
    currencyMask
    [formControl]="control"
    [required]="req"
    [options]="mergeOptions(options)"
  />
  <mat-error *ngIf="control?.touched">{{ errMsg }}</mat-error>
</mat-form-field>

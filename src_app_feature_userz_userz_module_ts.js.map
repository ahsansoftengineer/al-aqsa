<div class="mat_table" *ngIf="lb.ds">-
  <table mat-table matSort [dataSource]="lb.ds" style="box-shadow: none;" (matSortChange)="lb.sort($event)">
    <ng-container matColumnDef="id">
      <th style="width: 40px" mat-header-cell *matHeaderCellDef>{{ 'S No' | translate }}</th>
      <td mat-cell *matCellDef="let item; let i = index"> {{i + (lb.tbl.index * lb.tbl.size) + 1}} </td>
    </ng-container>
    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef mat-sort-header arrowPosition='after'>
        <di-tbl-txt field='title' lbl='Name' [group]='lb.fh'></di-tbl-txt>
      </th>
      <td mat-cell *matCellDef="let item"> {{item?.title}} </td>
    </ng-container>
    <ng-container matColumnDef="gender">
      <th mat-header-cell *matHeaderCellDef mat-sort-header arrowPosition='after'>
        <di-tbl-txt field='gender' lbl='Gender' [group]='lb.fh'></di-tbl-txt>
      </th>
      <td mat-cell *matCellDef="let item"> {{item?.gender}} </td>
    </ng-container>
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef mat-sort-header arrowPosition='after'>
        <di-tbl-txt field='email' lbl='Email' [group]='lb.fh'></di-tbl-txt>
      </th>
      <td mat-cell *matCellDef="let item"> {{item?.email}} </td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header arrowPosition='after'>
        <di-tbl-txt field='status' lbl='Status' [group]='lb.fh'></di-tbl-txt>
      </th>
      <td mat-cell *matCellDef="let item"> {{item?.status}} </td>
    </ng-container>
    <ng-container matColumnDef="desc">
      <th mat-header-cell *matHeaderCellDef mat-sort-header arrowPosition='after'>
        <di-tbl-txt field='desc' lbl='Description' [group]='lb.fh'></di-tbl-txt>
      </th>
      <td mat-cell *matCellDef="let item"> {{item?.desc}} </td>
    </ng-container>
    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef mat-sort-header arrowPosition='after'>
        <di-tbl-txt field='createdAt' lbl='Created At' [group]='lb.fh'></di-tbl-txt>
      </th>
      <td mat-cell *matCellDef="let item"> {{item?.createdAt}} </td>
    </ng-container>
    <ng-container matColumnDef="updatedAt">
      <th mat-header-cell *matHeaderCellDef mat-sort-header arrowPosition='after'>
        <di-tbl-txt field='updatedAt' lbl='Updated At' [group]='lb.fh'></di-tbl-txt>
      </th>
      <td mat-cell *matCellDef="let item"> {{item?.updatedAt}} </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef mat-sort-header arrowPosition='after'>
        <span style="font-size:16px; font-weight: 400;">Actions</span>
      </th>
      <td mat-cell *matCellDef="let item">
        <button mat-icon-button [matMenuTriggerFor]="menu" type="button">
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #menu="matMenu" type="button">
          <button mat-menu-item (click)="lb._switch(item?.id)">
            <mat-icon>toggle_off</mat-icon>
            <span>Disable</span>
          </button>
          <button mat-menu-item type="button">
            <mat-icon>delete</mat-icon>
            <span>Delete</span>
          </button>
        </mat-menu>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="lb.cols; sticky:true">
    </tr>
    <tr mat-row *matRowDef="let row; columns: lb.cols;"></tr>
  </table>
</div>

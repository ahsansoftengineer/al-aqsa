<form [formGroup]="_fs._form" (ngSubmit)="_onSubmit()">
  <div class="row m-0">
    <di-txt field='code' lbl="Student Code"></di-txt>
    <di-txt field='title' lbl="Name"></di-txt>
    <di-txt field='fatherName' lbl="Father Name"></di-txt>
    <di-txt field='className' lbl="Class"></di-txt>
    <di-txt field='section' lbl="Section"></di-txt>
    <di-txt field='status' lbl="Status"></di-txt>
    <di-txt field='desc' [req]="false" lbl="Description"></di-txt>
  </div>
</form>

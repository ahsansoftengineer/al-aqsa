<form [formGroup]="_fs._form" (ngSubmit)="_onSubmit()">
  <div class="row m-0">
    <di-txt field='code' lbl="Attendance Code"></di-txt>
    <di-txt field='studentName' lbl="Student Name"></di-txt>
    <di-txt field='attendanceDate' lbl="Attendance Date"></di-txt>
    <di-txt field='isPresent' lbl="Present/Absent"></di-txt>
    <di-txt field='status' lbl="Status"></di-txt>
    <di-txt field='desc' [req]="false" lbl="Remarks"></di-txt>
  </div>
</form>

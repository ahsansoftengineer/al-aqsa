<form [formGroup]="_fs._form" (ngSubmit)="_onSubmit()">
  <div class="row m-0">
    <di-txt field='code' lbl="Institute Code"></di-txt>
    <di-txt field='title' lbl="Institute Name"></di-txt>
    <di-txt field='address' lbl="Address"></di-txt>
    <di-txt field='phone' lbl="Phone Number"></di-txt>
    <di-txt field='email' lbl="Email"></di-txt>
    <di-txt field='principal' lbl="Principal Name"></di-txt>
    <di-txt field='status' lbl="Status"></di-txt>
    <di-txt field='desc' [req]="false" lbl="Description"></di-txt>
  </div>
</form>

<form [formGroup]="_fs._form" (ngSubmit)="_onSubmit()">
  <div class="row m-0">
    <di-txt field='code' lbl="Promotion Code"></di-txt>
    <di-txt field='studentName' lbl="Student Name"></di-txt>
    <di-txt field='currentClass' lbl="Current Class"></di-txt>
    <di-txt field='newClass' lbl="New Class"></di-txt>
    <di-txt field='promoteDate' lbl="Promotion Date"></di-txt>
    <di-txt field='status' lbl="Status"></di-txt>
    <di-txt field='desc' [req]="false" lbl="Remarks"></di-txt>
  </div>
</form>

<form [formGroup]="_fs._form" (ngSubmit)="_onSubmit()">
  <div class="row m-0">
    <di-txt field='code' lbl="Routine Code"></di-txt>
    <di-txt field='className' lbl="Class Name"></di-txt>
    <di-txt field='subject' lbl="Subject"></di-txt>
    <di-txt field='teacher' lbl="Teacher Name"></di-txt>
    <di-txt field='timing' lbl="Timing"></di-txt>
    <di-txt field='status' lbl="Status"></di-txt>
    <di-txt field='desc' [req]="false" lbl="Description"></di-txt>
  </div>
</form>
